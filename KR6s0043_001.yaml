body:
  text: 𭰹心渴仰專注法音惟願戒師廣垂湖演和云諸菩薩莫殺生殺生必當墮火坑殺命來生短命報娑婆兩目傷雙盲勸請道場諸衆等共斷殺業不須行佛子諸菩薩莫偷盜得物猶娘少死後即作畜生身被毛戴角來相報終日驅牽不停息無有功夫食水草猶迷心不覺知是故殷勤重報佛子諸菩薩莫邪淫邪淫顛倒罪根𭰹鐵床會會來相向鋸柱赫赫競來假身遍體體皆沾爛曰何不發菩提心佛子諸菩薩莫妄語來誰趣不見言見詐虛言鐵犁耕舌并解鋸為利見或衆生欺誑師僧及父母若能懺悔不忍惟當來必離波吒苦佛子諸菩薩莫估酒估酒洋銅來灌口足下火出炎連天獄卒持鉾斬兩手總為昏癡顛倒人身作當身自受仍被驅掠入阿鼻鐵壁千重無處事佛子諸菩薩莫自説自説喻若湯洗雪造罪猶如一剎那長入波吒而悶絶連明曉夜下長釘眼耳之中皆泣血罪因罪果罪根涼乃被牛頭來拔舌不容乞命暫而疏獄卒持秉而使泄佛子諸菩薩莫毀他毀他相將入奈刀劍毀橫役渡趣獄入泥水便䑆被混鈍猶如鑊沸一切地獄盡經過皮膚血肉如流水何時得離波吒佛子諸菩薩莫多慳多積寶仍山見有貧窮來乞者一針一草不能制貪心不識知厭足當來空手入黃泉佛子諸菩薩莫多嗔多嗔定受奔蛇身婉轉腸行無手足為前世忿怒曰八萬筒來唼食遺留自骨乃皮所苦難堪忍何時劫得勝人身佛子諸菩薩莫謗三寶若謗三寶墮惡道三百貝長釘定釘處叫喚連天聲浩浩謗佛謗更嗔銅開鐵櫸來相悖痛哉苦哉不可論何時值遇天掌道佛子和云微塵至犯黑極千生勝果菩提斯皆頓失玩嬰六道良亦可悲天上人間取生何路和云犯戒知報已落三途未番於中所經幾歲和云墮惡道中已至極苦更經劫數誠可痛心歲月疑長不知得聞父母三寶名字已否和云苦哉苦哉和云蓮花藏戒今日得聞衆共傾心願垂廣説和云我今懺悔不敢覆藏惟願戒戒師慈悲廣説和云大師密藏甘露真詮喜慶今聞願垂廣説和云如來心地曠劫障聞今遇宣揚願垂廣説和云恆沙戒品希遇宣揚願惟願戒師慈悲廣説𭰹心慚愧不敢覆藏露膽披肝發露懺悔曠大劫來恆沙罪障今聞此戒並得消除慚愧戒師布施歡喜乾符肆年四月報恩寺寫記
